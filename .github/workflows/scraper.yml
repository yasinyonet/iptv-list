name: Daily Scraper

on:
  schedule: 
    # Üç günde bir 01:00, UTC olarak güncellenir.
    - cron: '0 22 */3 * *'
  workflow_dispatch: # Manuel çalıştırmaya da izin verir

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './m3u_creator/package-lock.json'

      - name: Install Dependencies
        working-directory: ./m3u_creator
        run: npm ci

      - name: Run Scraper
        working-directory: ./m3u_creator
        run: npm start

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add m3u_creator/output/
          git commit -m "IPTV listeleri" || { echo "Değişiklik yok"; exit 0; }
          git push
