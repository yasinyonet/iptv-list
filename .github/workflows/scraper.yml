name: Daily Scraper

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Every 3 days at 01:00 UTC (22:00 UTC previous day)
    - cron: '0 22 */3 * *'
  workflow_dispatch:   # allows manual triggering

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './m3u_creator/package-lock.json'

      - name: Install Dependencies
        working-directory: ./m3u_creator
        run: npm ci

      - name: Run Scraper
        working-directory: ./m3u_creator
        run: npm start

      - name: Copy tr.m3u to stream directory
        run: |
          mkdir -p stream
          cp m3u_creator/output/tr.m3u stream/tr.m3u

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add m3u_creator/output/ stream/
          git commit -m "IPTV listeleri" || { echo "Değişiklik yok"; exit 0; }
          git push origin main
