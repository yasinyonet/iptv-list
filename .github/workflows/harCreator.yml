name: Capture HAR and Commit

on:
  workflow_dispatch:

jobs:
  capture:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install shot-scraper
        run: |
          pip install --upgrade shot-scraper
          shot-scraper install

      - name: Capture HAR
        run: |
          URL="https://www.atv.com.tr/canli-yayin"
          mkdir -p stream
          shot-scraper har "$URL" -o stream/output.har --timeout 120000

      - name: Extract .m3u8 URLs
        run: python extract_m3u8.py

      - name: Commit and push only the URLs file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stream/m3u8_urls.txt
          git reset stream/output.har 2>/dev/null || true
          git commit -m "Update m3u8 URLs [skip ci]" || echo "No changes to commit"
          git push
