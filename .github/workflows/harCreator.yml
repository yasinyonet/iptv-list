name: Capture HAR and Commit

on:
  workflow_dispatch:

jobs:
  capture:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Capture HAR with Playwright
        run: node capture.js

      - name: Extract .m3u8 URLs
        run: |
          pip install --upgrade pip
          python extract_m3u8.py

      - name: Commit and push only the URLs file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stream/m3u8_urls.txt
          git reset stream/output.har 2>/dev/null || true
          git commit -m "Update m3u8 URLs [skip ci]" || echo "No changes to commit"
          git push
