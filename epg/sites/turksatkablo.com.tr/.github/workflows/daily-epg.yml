name: Günlük EPG Güncelleme (turksatkablo)

on:
  schedule:
    # Her gün Türkiye saatiyle 03:00'da çalışır (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch:  # Manuel tetikleme için

jobs:
  update-epg:
    runs-on: ubuntu-latest

    steps:
      - name: 1️⃣ Depo kodlarını indir
        uses: actions/checkout@v3

      - name: 2️⃣ Node.js kur (v18)
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 3️⃣ Proje bağımlılıklarını yükle (npm install)
        run: npm install

      - name: 4️⃣ EPG verisini çek (npm run grab)
        run: npm run grab --- --site=turksatkablo.com.tr --output=./tr_epg.xml
        # DİKKAT: --output yolunu ana dizindeki tr_epg.xml olarak değiştirdim.
        # Eğer komutunuz zaten doğru yolu kullanıyorsa burayı olduğu gibi bırakabilirsiniz.

      - name: 5️⃣ Değişiklikleri GitHub'a geri gönder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tr_epg.xml
          # Eğer başka dosyalar da değişiyorsa (örn. iptv_list.json) onları da ekleyin:
          # git add iptv_list.json tr.m3u
          git diff --quiet && git diff --staged --quiet || git commit -m "🔄 Otomatik EPG güncellemesi: turksatkablo.com.tr - $(date +'%d.%m.%Y')"
          git push